<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XD WATERLESS</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

<div class="app">

<header>
<h1>XD WATERLESS</h1>
<p>No hose. No buckets. Just quick shine.</p>
</header>

<section class="selector">

<button class="vehicle active" data-size="kompak">Kompak</button>
<button class="vehicle" data-size="sedan">Sedan</button>
<button class="vehicle" data-size="suv">SUV</button>
<button class="vehicle" data-size="mpv">MPV</button>

</section>

<section class="packages">

<div class="card">
<h3>Lasak</h3>
<p>Quick exterior refresh</p>
<h2 id="lasakPrice">45</h2>
<button onclick="book('LASAK')">Book</button>
</div>

<div class="card">
<h3>Gempak</h3>
<p>Interior + exterior</p>
<h2 id="gempakPrice">80</h2>
<button onclick="book('GEMPAK')">Book</button>
</div>

<div class="card premium">
<h3>Terbaik</h3>
<p>Wax boost protection</p>
<h2 id="terbaikPrice">95</h2>
<button onclick="book('TERBAIK')">Book</button>
</div>

</section>

<footer>

<p>WhatsApp: 016-7003569</p>
<p>Shah Alam</p>

</footer>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
