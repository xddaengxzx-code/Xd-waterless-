<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XD WATERLESS</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="nav">
  <div class="logo">XD WATERLESS</div>
  <a href="https://wa.me/60167003569" class="book-btn">Book Now</a>
</header>

<section class="vehicle-select">
  <h2>Select Vehicle</h2>

  <div class="vehicle-grid">

    <button class="vehicle active" data-size="kompak">
      Kompak
    </button>

    <button class="vehicle" data-size="sedan">
      Sedan
    </button>

    <button class="vehicle" data-size="suv">
      SUV
    </button>

    <button class="vehicle" data-size="mpv">
      MPV
    </button>

  </div>
</section>

<section class="packages">

  <div class="package">
    <h3>Lasak</h3>
    <div class="price">RM <span id="lasakPrice">45</span></div>
    <button onclick="book('Lasak')">Book</button>
  </div>

  <div class="package">
    <h3>Gempak</h3>
    <div class="price">RM <span id="gempakPrice">80</span></div>
    <button onclick="book('Gempak')">Book</button>
  </div>

  <div class="package">
    <h3>Terbaik</h3>
    <div class="price">RM <span id="terbaikPrice">95</span></div>
    <button onclick="book('Terbaik')">Book</button>
  </div>

</section>

<script src="assets/js/script.js" defer></script>

</body>
</html>
